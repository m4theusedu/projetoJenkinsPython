<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Calculadora Jenkins</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <main class="container">
        <section class="card">
            <h1>Calculadora Jenkins - Alteração feita às 19h26</h1>
            <p>Aplicação Python Flask publicada automaticamente pelo Jenkins.</p>

            <form method="post">
                <label for="numero1">Número 1</label>
                <input type="number" step="any" id="numero1" name="numero1" value="{{ numero1 }}" required>

                <label for="operacao">Operação</label>
                <select id="operacao" name="operacao">
                    <option value="somar" {% if operacao == 'somar' %}selected{% endif %}>Somar</option>
                    <option value="subtrair" {% if operacao == 'subtrair' %}selected{% endif %}>Subtrair</option>
                    <option value="multiplicar" {% if operacao == 'multiplicar' %}selected{% endif %}>Multiplicar</option>
                    <option value="dividir" {% if operacao == 'dividir' %}selected{% endif %}>Dividir</option>
                </select>

                <label for="numero2">Número 2</label>
                <input type="number" step="any" id="numero2" name="numero2" value="{{ numero2 }}" required>

                <button type="submit">Calcular</button>
            </form>

            {% if resultado is not none %}
                <div class="resultado">Resultado: {{ resultado }}</div>
            {% endif %}

            {% if erro %}
                <div class="erro">Erro: {{ erro }}</div>
            {% endif %}
        </section>
    </main>
</body>
</html>
